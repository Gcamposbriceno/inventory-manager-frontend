    <!-- Status bar -->

      <span style="font-size:15px; font-weight:600; color:#1C1C1A; font-family:-apple-system,system-ui,sans-serif; letter-spacing:-0.3px;">9:41</span>
      <div style="display:flex; align-items:center; gap:5px;">
        <ion-icon name="cellular" style="font-size:14px; color:#1C1C1A;"></ion-icon>
        <ion-icon name="wifi" style="font-size:14px; color:#1C1C1A;"></ion-icon>
        <ion-icon name="battery-full" style="font-size:18px; color:#1C1C1A;"></ion-icon>
      </div>
    </div>

    <!-- Content area (screen + tabbar + modal overlay) -->
    <div style="flex:1; position:relative; display:flex; flex-direction:column; overflow:hidden;">
      <div style="flex:1; overflow:hidden; position:relative;">
        {{ screen }}
      </div>
      {{ tabBar }}
      <sc-if value="{{ hasOverlay }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute; inset:0; z-index:10; background:#F8F7F4;">
          {{ overlay }}
        </div>
      </sc-if>
    </div>

  </div>
</div>

  renderTabBar() {

      low:     { bg: '#FFFBEB', color: '#B45309', label: 'Bajo mín.'   },

      ok:      { bg: '#ECFDF5', color: '#065F46', label: 'OK'          },
    }[status];
    return r('div', { style:{ padding:'2px 8px', borderRadius:9999, background:cfg.bg } },
      r('span', { style:{ fontSize:11, fontWeight:500, color:cfg.color, fontFamily:'system-ui' } }, cfg.label)
    );
  }

  renderDespensa() {
    const C = this.C;
    const r = React.createElement;
    const { despanPantry, despanFilter, expandedType } = this.state;

    const getStatus = (row) => {
      if (row.current_stock === 0)                          return 'empty';
      if (row.current_stock < row.rop)                      return 'low';
      if (row.current_stock < row.desired_stock)            return 'partial';
      return 'ok';
    };

    const types         = this.TYPES[despanPantry] || [];
    const criticalCount = types.filter(t => ['empty','low'].includes(getStatus(t))).length;
    const emptyCount    = types.filter(t => getStatus(t) === 'empty').length;
    const okCount       = types.filter(t => ['partial','ok'].includes(getStatus(t))).length;

    const filtered = types.filter(t => {
      const s = getStatus(t);
      if (despanFilter === 'critical') return s === 'empty' || s === 'low';
      if (despanFilter === 'ok')       return s === 'partial' || s === 'ok';
      return true;
    });

    const barColor = (s) => ({ empty: C.expired, low: C.warn, partial: C.warn, ok: C.mint })[s];

    const typeRow = (row, i, arr) => {
      const status   = getStatus(row);
      const ratio    = Math.min(row.current_stock / row.desired_stock, 1);
      const expanded = expandedType === row.type_id;

  renderLista() {
    const C = this.C;
    const r = React.createElement;
    const { listaChecked, listaPantry } = this.state;

    // Reunir todos los tipos que necesitan reposición
    const allItems = [];
    Object.entries(this.TYPES).forEach(([pantryId, types]) => {
      const pantry = this.PANTRIES.find(p => p.id === pantryId);
      types.forEach(t => {
        if (t.current_stock < t.desired_stock) {
          const needed  = +( t.desired_stock - t.current_stock ).toFixed(2);
          const status  = t.current_stock === 0 ? 'empty' : t.current_stock < t.rop ? 'low' : 'partial';
          allItems.push({
            key: `${pantryId}-${t.type_id}`,
            type_name: t.type_name, needed, unit: t.measurement_unit,
            status, pantryId, pantryName: pantry?.name || pantryId,
          });
        }
      });
    });

    const filtered     = listaPantry === 'all' ? allItems : allItems.filter(i => i.pantryId === listaPantry);
    const urgent       = filtered.filter(i => i.status !== 'partial');
    const suggested    = filtered.filter(i => i.status === 'partial');
    const checkedCount = filtered.filter(i => listaChecked?.[i.key]).length;

    const toggle = (key) => {
      const next = { ...(this.state.listaChecked || {}) };
      next[key] = !next[key];
      this.setState({ listaChecked: next });
    };

    const itemRow = (item, isLast) => {
      const checked = listaChecked?.[item.key] || false;
      return r('div', { key: item.key },
        r('div', {
          onClick: () => toggle(item.key),
          style:{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', cursor:'pointer' }
        },
          r('div', { style:{
            width:22, height:22, borderRadius:6, flexShrink:0,
            background: checked ? C.forest : 'transparent',
            border: checked ? 'none' : `2px solid ${C.stone}`,
            display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.15s'
          } }, checked ? r('span', { style:{ fontSize:12, color:C.cream, lineHeight:1, fontWeight:700 } }, '✓') : null),
          r('div', { style:{ flex:1 } },
            r('span', { style:{ fontSize:15, fontWeight:500, color: checked ? C.pebble : C.ink, display:'block', fontFamily:'system-ui', textDecoration: checked ? 'line-through' : 'none' } }, item.type_name),
            r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, item.pantryName)
          ),
          r('div', { style:{ textAlign:'right' } },
            r('span', { style:{ fontSize:15, fontWeight:600, color: checked ? C.pebble : item.status === 'partial' ? C.ink : C.expired, fontFamily:'system-ui', display:'block' } },
              `${item.needed} ${item.unit}`
            ),
            r('span', { style:{ fontSize:11, color:C.pebble, fontFamily:'system-ui' } }, 'comprar')
          )
        ),
        !isLast ? r('div', { style:{ height:1, margin:'0 16px', background:C.stone } }) : null
      );
    };

    const section = (title, items, dot) => items.length === 0 ? null :
      r('div', { style:{ marginBottom:20 } },
        r('div', { style:{ display:'flex', alignItems:'center', gap:6, marginBottom:8, paddingLeft:20 } },
          r('div', { style:{ width:7, height:7, borderRadius:4, background:dot, flexShrink:0 } }),
          r('span', { style:{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:C.pebble, fontFamily:'system-ui' } }, title),
          r('span', { style:{ fontSize:11, color:C.pebble, fontFamily:'system-ui', marginLeft:2 } }, `· ${items.length}`)
        ),
        r('div', { style:{ margin:'0 20px', borderRadius:16, border:`1px solid ${C.stone}`, background:C.white, overflow:'hidden' } },
          ...items.map((item, i) => itemRow(item, i === items.length - 1))
        )
      );

    return r('div', { style:{ height:'100%', overflowY:'auto', overflowX:'hidden', background:C.cream } },

      // Header
      r('div', { style:{ padding:'8px 20px 16px' } },
        r('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 } },
          r('div', {},
            r('div', { style:{ fontSize:28, fontWeight:600, color:C.ink, fontFamily:'"DM Serif Display", serif' } }, 'Lista de compras'),
            r('div', { style:{ fontSize:13, color:C.pebble, marginTop:2, fontFamily:'system-ui' } },
              filtered.length === 0 ? 'Todo en orden' : `${filtered.length - checkedCount} de ${filtered.length} pendientes`
            )
          ),
          r('div', { style:{ width:40, height:40, borderRadius:20, background:C.white, border:`1px solid ${C.stone}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' } },
            this.ico('share-social-outline', 18, C.pebble)
          )
        ),

        // Barra de progreso
        filtered.length > 0 ? r('div', { style:{ height:5, borderRadius:3, background:C.stone, marginBottom:16, overflow:'hidden' } },
          r('div', { style:{ height:'100%', borderRadius:3, background:C.mint, width:`${(checkedCount / filtered.length) * 100}%`, transition:'width 0.3s' } })
        ) : null,

        // Filtro despensas
        r('div', { style:{ display:'flex', gap:8, overflowX:'auto' } },
          ...[ { id:'all', name:'Todas' }, ...this.PANTRIES ].map(p =>
            r('button', { key:p.id, onClick:() => this.setState({ listaPantry:p.id }), style:{
              padding:'7px 16px', borderRadius:9999, border:'none', cursor:'pointer', flexShrink:0,
              background: listaPantry === p.id ? C.forest : C.white,
              outline: listaPantry !== p.id ? `1px solid ${C.stone}` : 'none'
            } },
              r('span', { style:{ fontSize:13, fontWeight: listaPantry === p.id ? 600 : 500, color: listaPantry === p.id ? C.cream : C.pebble, fontFamily:'system-ui' } }, p.name)

      ),

      // Contenido

        ? r('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, paddingTop:72 } },
            this.ico('checkmark-circle-outline', 56, C.mint),
            r('span', { style:{ fontSize:22, fontWeight:600, color:C.ink, fontFamily:'"DM Serif Display", serif' } }, 'Todo en orden'),
            r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, 'No hay productos que reponer')
          )
        : r('div', { style:{ paddingBottom:40 } },
            section('Urgente', urgent, C.expired),
            section('Sugerido', suggested, C.warn),
            checkedCount > 0
              ? r('div', { style:{ padding:'4px 20px 0' } },
                  r('button', {
                    onClick: () => this.setState({ listaChecked:{} }),
                    style:{ width:'100%', padding:'13px 0', borderRadius:12, border:`1px solid ${C.stone}`, background:C.white, cursor:'pointer' }
                  }, r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, `Limpiar ${checkedCount} marcado${checkedCount > 1 ? 's' : ''}`))
                )
              : null
          )
    );
  }

  renderHistorial() {
    const C = this.C;
    const r = React.createElement;

    const WEEKS = [
      { label:'Sem 23', val:8  },
      { label:'Sem 24', val:13 },
      { label:'Sem 25', val:6  },
      { label:'Sem 26', val:11 },
    ];
    const TOP = [
      { name:'Leche',   val:8,   unit:'L',   pct:100 },
      { name:'Huevos',  val:24,  unit:'ud.',  pct:88  },
      { name:'Pan',     val:12,  unit:'ud.',  pct:64  },
      { name:'Arroz',   val:3,   unit:'kg',   pct:42  },
      { name:'Aceite',  val:1.5, unit:'L',   pct:26  },
    ];

    const maxVal = Math.max(...WEEKS.map(w => w.val));
    const barW   = 54;
    const gap    = 16;
    const chartH = 110;
    const svgW   = WEEKS.length * (barW + gap) - gap;

    const chart = r('svg', {
      width: svgW, height: chartH + 32,
      style:{ display:'block', overflow:'visible' }
    },
      ...WEEKS.map((w, i) => {
        const barH  = Math.max(10, (w.val / maxVal) * chartH);
        const x     = i * (barW + gap);
        const y     = chartH - barH;
        const isNow = i === WEEKS.length - 1;
        return r('g', { key:i },
          r('rect', { x, y, width:barW, height:barH, rx:10,
            fill: isNow ? C.forest : C.mint, opacity: isNow ? 1 : 0.85 }),
          r('text', { x: x + barW/2, y: y - 7, textAnchor:'middle',
            fontSize:12, fontWeight:600, fill: isNow ? C.forest : C.pebble,

                    if (!exists) {
                      this.setState({
                        recipeFormIngredients: [...recipeFormIngredients, { typeName:type.name, amount:'', unit:type.measurement_unit }],
                        recipeIngShowSearch: false, recipeIngSearch: '',
                      });
                    } else {
                      this.setState({ recipeIngShowSearch: false, recipeIngSearch: '' });
                    }
                  },
                  style:{ padding:'12px 16px', cursor:'pointer', borderBottom: i < filteredTypes.length-1 ? `1px solid ${C.stone}` : 'none' }
                },
                  r('span', { style:{ fontSize:14, color:C.ink, fontFamily:'system-ui' } }, type.name)
                )
              ))
            ) : null
          ) : null
        ),

        // Submit
        r('button', {
          onClick: () => this.setState({ modalScreen: null }),
          style:{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, width:'100%', background:C.forest, border:'none', borderRadius:12, padding:'12px 20px', cursor:'pointer' }
        },
          this.ico('save-outline', 18, C.cream),
          r('span', { style:{ fontSize:15, fontWeight:600, color:C.cream, fontFamily:'system-ui' } }, isEdit ? 'Guardar cambios' : 'Guardar receta')
        )
      )
    );
  }

  renderScan() {
    const C = this.C;
    const r = React.createElement;
    const { scanStep, scanProduct, scanConsumptionMode, scanAmount } = this.state;

    const MOCK = {
      name: 'Leche Entera 1L', brand: 'Soprole',
      typeName: 'Leche', current: 2, unit: 'L', icon: 'water-outline',

    const numAmount  = parseFloat(scanAmount) || 0.5;
    const showSheet  = scanStep === 'result';

    // Esquinas del marco de escaneo
    const corners = ['tl','tr','bl','br'].map(pos => {
      const t = pos[0] === 't', l = pos[1] === 'l';
      return r('div', { key: pos, style:{
        position:'absolute',
        top:  t ? -1 : 'auto', bottom: !t ? -1 : 'auto',
        left: l ? -1 : 'auto', right:  !l ? -1 : 'auto',
        width: 22, height: 22,
        borderTop:    t ? '2.5px solid #52B788' : 'none',
        borderBottom: !t ? '2.5px solid #52B788' : 'none',
        borderLeft:   l ? '2.5px solid #52B788' : 'none',
        borderRight:  !l ? '2.5px solid #52B788' : 'none',
        borderRadius: t&&l?'4px 0 0 0': t&&!l?'0 4px 0 0': !t&&l?'0 0 0 4px':'0 0 4px 0',
      }});
    });

    return r('div', { style:{ height:'100%', position:'relative', overflow:'hidden', background:'#0D0D0D' } },

      // ── Fondo cámara simulado ────────────────────────────
      r('div', { style:{ position:'absolute', inset:0, background:'linear-gradient(160deg,#111 0%,#1a1a1a 100%)' } }),

      r('div', { style:{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' } },
        r('div', { style:{ width:'100%', flex:1, background:'rgba(0,0,0,0.72)' } }),
        r('div', { style:{ display:'flex', width:'100%', alignItems:'stretch' } },
          r('div', { style:{ flex:1, background:'rgba(0,0,0,0.72)' } }),
          r('div', { style:{ width:252, height:140, position:'relative', flexShrink:0 } }, ...corners),
          r('div', { style:{ flex:1, background:'rgba(0,0,0,0.72)' } })
        ),
        r('div', { style:{ width:'100%', flex:1, background: showSheet ? 'rgba(0,0,0,0.72)' : 'rgba(0,0,0,0.72)' } })
      ),

      // ── Botón cerrar ─────────────────────────────────────
      r('button', {
        onClick: () => this.setState({ modalScreen:null, scanStep:null }),
        style:{ position:'absolute', top:16, left:16, width:36, height:36, borderRadius:18, background:'rgba(255,255,255,0.15)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', zIndex:10 }
      }, this.ico('close', 20, '#FFFFFF')),

      // ── Texto instrucción + botón trampa ─────────────────
      !showSheet ? r('div', { style:{ position:'absolute', bottom:100, left:0, right:0, display:'flex', flexDirection:'column', alignItems:'center', gap:14 } },
        r('span', { style:{ fontSize:14, color:'rgba(255,255,255,0.7)', fontFamily:'system-ui', letterSpacing:0.2 } }, 'Apunta al código de barras'),
        r('button', {
          onClick: () => this.setState({ scanStep:'result', scanProduct:MOCK, scanConsumptionMode:'all', scanAmount:'' }),
          style:{ padding:'9px 22px', borderRadius:20, background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.25)', cursor:'pointer' }
        }, r('span', { style:{ fontSize:13, color:'rgba(255,255,255,0.85)', fontFamily:'system-ui' } }, '✦  Simular escaneo'))
      ) : null,

      // ── Bottom sheet ─────────────────────────────────────
      showSheet ? r('div', {
        style:{
          position:'absolute', bottom:0, left:0, right:0,
          background:C.cream, borderRadius:'24px 24px 0 0',
          padding:'12px 20px 32px',
          boxShadow:'0 -8px 40px rgba(0,0,0,0.35)',
        }
      },
        // Handle
        r('div', { style:{ width:36, height:4, borderRadius:2, background:C.stone, margin:'0 auto 20px' } }),

        // Info del producto detectado
        r('div', { style:{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', background:C.mist, borderRadius:16, marginBottom:22 } },
          r('div', { style:{ width:44, height:44, borderRadius:12, background:C.white, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 } },
            this.ico(scanProduct?.icon || 'cube-outline', 22, C.sage)
          ),
          r('div', { style:{ flex:1 } },
            r('span', { style:{ fontSize:15, fontWeight:600, color:C.ink, display:'block', fontFamily:'system-ui' } }, scanProduct?.name),
            r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, `${scanProduct?.brand}  ·  stock: ${scanProduct?.current} ${scanProduct?.unit}`)
          ),
          r('div', { style:{ padding:'3px 8px', borderRadius:8, background:'#ECFDF5' } },
            r('span', { style:{ fontSize:11, fontWeight:600, color:'#065F46', fontFamily:'system-ui' } }, 'Detectado')
          )
        ),

        // Selector modo consumo
        r('span', { style:{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:C.pebble, display:'block', marginBottom:10, fontFamily:'system-ui' } }, '¿Cuánto consumiste?'),
        r('div', { style:{ display:'flex', gap:10, marginBottom:20 } },
          r('button', {
            onClick: () => this.setState({ scanConsumptionMode:'all', scanAmount:'' }),
            style:{ flex:1, padding:'13px 0', borderRadius:14, border:'none', cursor:'pointer',
              background: scanConsumptionMode === 'all' ? C.forest : C.white,
              outline: scanConsumptionMode !== 'all' ? `1px solid ${C.stone}` : 'none' }
          },
            r('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 } },
              this.ico('trash-outline', 16, scanConsumptionMode === 'all' ? C.cream : C.pebble),
              r('span', { style:{ fontSize:13, fontWeight:600, color: scanConsumptionMode === 'all' ? C.cream : C.ink, fontFamily:'system-ui' } }, 'Se acabó')
            )
          ),
          r('button', {
            onClick: () => this.setState({ scanConsumptionMode:'partial', scanAmount:'0.5' }),
            style:{ flex:1, padding:'13px 0', borderRadius:14, border:'none', cursor:'pointer',
              background: scanConsumptionMode === 'partial' ? C.forest : C.white,
              outline: scanConsumptionMode !== 'partial' ? `1px solid ${C.stone}` : 'none' }
          },
            r('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 } },
              this.ico('remove-circle-outline', 16, scanConsumptionMode === 'partial' ? C.cream : C.pebble),
              r('span', { style:{ fontSize:13, fontWeight:600, color: scanConsumptionMode === 'partial' ? C.cream : C.ink, fontFamily:'system-ui' } }, 'Una parte')
            )
          )
        ),

        // Stepper cantidad (solo modo parcial)
        scanConsumptionMode === 'partial' ? r('div', { style:{ display:'flex', alignItems:'center', background:C.white, borderRadius:16, border:`1px solid ${C.stone}`, padding:4, gap:4, marginBottom:20 } },
          r('button', {
            onClick: () => this.setState({ scanAmount: String(Math.max(0.5, +(numAmount - 0.5).toFixed(1)) ) }),
            style:{ width:52, height:52, borderRadius:12, background:C.stone, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }
          }, r('span', { style:{ fontSize:26, color:C.ink, lineHeight:1, fontWeight:300 } }, '−')),
          r('div', { style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'6px 0' } },
            r('span', { style:{ fontSize:30, fontWeight:600, color:C.ink, fontFamily:'system-ui', lineHeight:1 } }, numAmount.toFixed(1)),
            r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui', marginTop:3 } }, scanProduct?.unit)
          ),
          r('button', {
            onClick: () => this.setState({ scanAmount: String(Math.min(scanProduct?.current || 99, +(numAmount + 0.5).toFixed(1))) }),
            style:{ width:52, height:52, borderRadius:12, background:C.mist, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }
          }, r('span', { style:{ fontSize:26, color:C.sage, lineHeight:1, fontWeight:300 } }, '+'))
        ) : null,

        // Confirmar
        r('button', {
          onClick: () => this.setState({ modalScreen:null, scanStep:null }),
          style:{ width:'100%', background:C.forest, border:'none', borderRadius:12, padding:'14px 20px', cursor:'pointer', marginBottom:10 }
        }, r('span', { style:{ fontSize:15, fontWeight:600, color:C.cream, fontFamily:'system-ui' } }, 'Registrar consumo')),

        r('button', {
          onClick: () => this.setState({ scanStep:'camera' }),
          style:{ width:'100%', background:'none', border:'none', padding:'6px 0', cursor:'pointer' }
        }, r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, 'Cancelar'))

      ) : null
    );
  }

  renderAddType() {
    const C = this.C;
    const r = React.createElement;
    const { addTypeStep, addTypeSearch, addTypeSelected, addTypeRop, addTypeDesiredStock, addedSkus, addProdSearch } = this.state;
    const UNIT = { kg:'kg', l:'L', ml:'ml', g:'g', un:'ud.' };
    const UNIT_LABEL = { kg:'kilogramos', l:'litros', ml:'mililitros', g:'gramos', un:'unidades' };

    const backBtn = (label, onClick) => r('button', {
      onClick, style:{ display:'flex', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer', padding:0, marginBottom:20 }
    }, this.ico('chevron-back', 18, C.pebble), r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, label));

    const selectedPantryName = (this.PANTRIES.find(p => p.id === this.state.despanPantry) || {}).name || '';

    // Indicador de 3 pasos
    const stepIndicator = (active) => {
      const steps = [
        { n:'1', label:'Tipo'      },
        { n:'2', label:'Umbrales'  },
        { n:'3', label:'Productos' },
      ];
      return r('div', { style:{ display:'flex', alignItems:'center', gap:0, marginBottom:24 } },
        ...steps.map((s, i) => {
          const done   = i < active;
          const curr   = i === active;
          const dotBg  = done ? C.mist : curr ? C.forest : C.stone;
          const dotTxt = done ? C.forest : curr ? C.cream : C.pebble;
          const lblTxt = curr ? C.ink : C.pebble;
          const lblW   = curr ? 600 : 400;
          return r('div', { key:s.n, style:{ display:'flex', alignItems:'center', flex: i < steps.length-1 ? 1 : 'none' } },
            r('div', { style:{ display:'flex', alignItems:'center', gap:6, flexShrink:0 } },
              r('div', { style:{ width:22, height:22, borderRadius:11, background:dotBg, display:'flex', alignItems:'center', justifyContent:'center' } },
                r('span', { style:{ fontSize:10, fontWeight:700, color:dotTxt, fontFamily:'system-ui' } }, done ? '✓' : s.n)
              ),
              r('span', { style:{ fontSize:12, fontWeight:lblW, color:lblTxt, fontFamily:'system-ui' } }, s.label)
            ),
            i < steps.length-1
              ? r('div', { style:{ flex:1, height:1, background: done ? C.mint : C.stone, margin:'0 8px' } })
              : null
          );
        })
      );
    };

    // Tarjeta ancla del tipo seleccionado
    const typeCard = (type, unit) => r('div', { style:{ background:C.mist, borderRadius:16, padding:'12px 16px', marginBottom:28, display:'flex', alignItems:'center', gap:12 } },
      r('div', { style:{ width:36, height:36, borderRadius:12, background:C.white, display:'flex', alignItems:'center', justifyContent:'center' } },
        this.ico('cube-outline', 18, C.sage)
      ),
      r('div', {},
        r('span', { style:{ fontSize:15, fontWeight:600, color:C.ink, display:'block', fontFamily:'system-ui' } }, type?.name),
        r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, `${unit} · ${selectedPantryName}`)
      )
    );

    // ── Paso 1: buscar ───────────────────────────────────
    if (addTypeStep === 'search') {
      const filtered = this.PRODUCT_TYPES.filter(t => t.name.toLowerCase().includes(addTypeSearch.toLowerCase()));
      return r('div', { style:{ height:'100%', background:C.cream, display:'flex', flexDirection:'column' } },
        r('div', { style:{ padding:'16px 20px 12px' } },
          backBtn('Volver', () => this.setState({ modalScreen: null })),
          r('div', { style:{ fontSize:26, fontWeight:600, color:C.ink, fontFamily:'"DM Serif Display", serif', marginBottom:2 } }, 'Agregar tipo'),
          r('span', { style:{ fontSize:13, fontWeight:500, color:C.forest, display:'block', marginBottom:4, fontFamily:'system-ui' } }, selectedPantryName),
          r('span', { style:{ fontSize:13, color:C.pebble, display:'block', marginBottom:20, fontFamily:'system-ui' } }, '¿Qué tipo de producto quieres seguir?'),
          stepIndicator(0),
          r('div', { style:{ display:'flex', alignItems:'center', background:C.stone, borderRadius:12, padding:'0 12px', gap:8 } },
            this.ico('search-outline', 18, C.pebble),
            r('input', { placeholder:'Buscar tipo…', value:addTypeSearch, autoFocus:true, onChange:(e) => this.setState({ addTypeSearch:e.target.value }),
              style:{ flex:1, border:'none', outline:'none', padding:'14px 0', fontSize:16, color:C.ink, background:'transparent', fontFamily:'system-ui' } }),
            addTypeSearch.length > 0 ? r('button', { onClick:() => this.setState({ addTypeSearch:'' }), style:{ background:'none', border:'none', cursor:'pointer', display:'flex', padding:4 } },
              this.ico('close-circle', 16, C.pebble)) : null
          )
        ),
        filtered.length === 0
          ? r('div', { style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, padding:'0 20px' } },
              this.ico('search-outline', 48, C.pebble),
              r('span', { style:{ fontSize:15, color:C.pebble, textAlign:'center', fontFamily:'system-ui' } }, `Sin resultados para "${addTypeSearch}"`)
            )
          : r('div', { style:{ flex:1, overflowY:'auto', padding:'0 20px 40px' } },
              ...filtered.map((type, i) => r('div', { key:type.id },
                r('div', {
                  onClick:() => this.setState({ addTypeStep:'configure', addTypeSelected:type, addTypeRop:'0', addTypeDesiredStock:'0' }),
                  style:{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 0', cursor:'pointer' }
                },
                  r('div', {},
                    r('span', { style:{ fontSize:15, fontWeight:500, color:C.ink, display:'block', fontFamily:'system-ui' } }, type.name),
                    r('span', { style:{ fontSize:12, color:C.pebble, display:'block', marginTop:2, fontFamily:'system-ui' } }, UNIT_LABEL[type.measurement_unit] || type.measurement_unit)
                  ),
                  this.ico('chevron-forward', 16, C.pebble)
                ),
                i < filtered.length - 1 ? r('div', { style:{ height:1, background:C.stone } }) : null
              ))
            )
      );
    }

    // ── Paso 2: umbrales ─────────────────────────────────
    if (addTypeStep === 'configure') {
      const type    = addTypeSelected;
      const unitKey = type?.measurement_unit;
      const unit    = UNIT[unitKey] || unitKey || '';
      const stepFor = (u) => ({ un:1, kg:0.5, l:0.5, ml:100, g:50 })[u] || 1;
      const step    = stepFor(unitKey);
      const dec     = step < 1 ? 1 : 0;
      const numRop  = parseFloat(addTypeRop) || 0;
      const numDes  = parseFloat(addTypeDesiredStock) || 0;

      const stepper = (label, hint, numVal, onMinus, onPlus) =>
        r('div', { style:{ marginBottom:24 } },
          r('div', { style:{ marginBottom:12 } },
            r('span', { style:{ fontSize:15, fontWeight:600, color:C.ink, display:'block', fontFamily:'system-ui', marginBottom:2 } }, label),
            r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, hint)
          ),
          r('div', { style:{ display:'flex', alignItems:'center', background:C.white, borderRadius:16, border:`1px solid ${C.stone}`, padding:4, gap:4 } },
            r('button', {
              onClick: onMinus,
              style:{ width:52, height:52, borderRadius:12, background:numVal > 0 ? C.stone : 'transparent', border:'none', cursor:numVal > 0 ? 'pointer' : 'default', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }
            }, r('span', { style:{ fontSize:24, color:numVal > 0 ? C.ink : C.stone, lineHeight:1, fontFamily:'system-ui', fontWeight:300 } }, '−')),
            r('div', { style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'8px 0' } },
              r('span', { style:{ fontSize:32, fontWeight:600, color:C.ink, fontFamily:'system-ui', lineHeight:1 } }, numVal.toFixed(dec)),
              r('span', { style:{ fontSize:13, color:C.pebble, fontFamily:'system-ui', marginTop:4 } }, unit)
            ),
            r('button', {
              onClick: onPlus,
              style:{ width:52, height:52, borderRadius:12, background:C.mist, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }
            }, r('span', { style:{ fontSize:24, color:C.sage, lineHeight:1, fontFamily:'system-ui', fontWeight:300 } }, '+'))
          )
        );

      const desInvalid = numDes > 0 && numDes < numRop;
      const canContinue = numRop > 0 && numDes >= numRop;

      return r('div', { style:{ height:'100%', overflowY:'auto', overflowX:'hidden', background:C.cream } },
        r('div', { style:{ padding:'16px 20px 40px' } },
          backBtn('Cambiar tipo', () => this.setState({ addTypeStep:'search' })),
          stepIndicator(1),
          typeCard(type, unit),

          stepper(
            'Mínimo aceptable',
            'Recibirás una alerta cuando el stock caiga por debajo de este valor.',
            numRop,
            () => this.setState({ addTypeRop: String(Math.max(0, +(numRop - step).toFixed(dec))) }),
            () => this.setState({ addTypeRop: String(+(numRop + step).toFixed(dec)) })
          ),
          stepper(
            'Stock deseado',
            'La cantidad que quieres tener habitualmente en tu despensa.',
            numDes,
            () => this.setState({ addTypeDesiredStock: String(Math.max(0, +(numDes - step).toFixed(dec))) }),
            () => this.setState({ addTypeDesiredStock: String(+(numDes + step).toFixed(dec)) })
          ),

          desInvalid ? r('div', { style:{ background:'#FEF2F2', borderRadius:12, padding:'10px 14px', marginBottom:20, display:'flex', alignItems:'center', gap:8 } },
            this.ico('warning-outline', 16, '#DC2626'),
            r('span', { style:{ fontSize:13, color:'#DC2626', fontFamily:'system-ui' } }, 'El stock deseado debe ser mayor o igual al mínimo.')
          ) : null,

          r('button', {
            onClick: canContinue ? () => this.setState({ addTypeStep:'products', addProdSearch:'' }) : null,
            style:{ width:'100%', background: canContinue ? C.forest : C.stone, border:'none', borderRadius:12, padding:'15px 20px', cursor: canContinue ? 'pointer' : 'default' }
          },
            r('span', { style:{ fontSize:15, fontWeight:600, color: canContinue ? C.cream : C.pebble, fontFamily:'system-ui' } }, 'Continuar')
          )
        )
      );
    }

    // ── Paso 3: productos ────────────────────────────────
    const type    = addTypeSelected;
    const unitKey = type?.measurement_unit;
    const unit    = UNIT[unitKey] || unitKey || '';
    const prods   = this.PRODS[type?.name] || [
      { sku:'gp1', name:`${type?.name} Premium`,   brand:'Marca A' },
      { sku:'gp2', name:`${type?.name} Estándar`,  brand:'Marca B' },
      { sku:'gp3', name:`${type?.name} Económico`, brand:'Marca C' },
    ];
    const filteredProds = prods.filter(p =>
      p.name.toLowerCase().includes(addProdSearch.toLowerCase()) ||
      p.brand.toLowerCase().includes(addProdSearch.toLowerCase())
    );
    const addedCount = Object.keys(addedSkus || {}).filter(sku =>
      prods.some(p => p.sku === sku) && addedSkus[sku] > 0
    ).length;

    return r('div', { style:{ height:'100%', background:C.cream, display:'flex', flexDirection:'column' } },
      // Cabecera fija
      r('div', { style:{ padding:'16px 20px 12px', flexShrink:0 } },
        backBtn('Volver a umbrales', () => this.setState({ addTypeStep:'configure' })),
        stepIndicator(2),
        typeCard(type, unit),
        r('div', { style:{ display:'flex', alignItems:'center', background:C.stone, borderRadius:12, padding:'0 12px', gap:8 } },
          this.ico('search-outline', 18, C.pebble),
          r('input', { placeholder:'Buscar producto…', value:addProdSearch, onChange:(e) => this.setState({ addProdSearch:e.target.value }),
            style:{ flex:1, border:'none', outline:'none', padding:'13px 0', fontSize:15, color:C.ink, background:'transparent', fontFamily:'system-ui' } }),
          addProdSearch.length > 0 ? r('button', { onClick:() => this.setState({ addProdSearch:'' }), style:{ background:'none', border:'none', cursor:'pointer', display:'flex', padding:4 } },
            this.ico('close-circle', 16, C.pebble)) : null
        )
      ),

      // Lista de productos
      r('div', { style:{ flex:1, overflowY:'auto' } },
        filteredProds.length === 0
          ? r('div', { style:{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, padding:'40px 20px' } },
              this.ico('search-outline', 40, C.pebble),
              r('span', { style:{ fontSize:14, color:C.pebble, textAlign:'center', fontFamily:'system-ui' } }, `Sin resultados para "${addProdSearch}"`)
            )
          : r('div', { style:{ padding:'4px 20px 0' } },
              ...filteredProds.map((prod, i) => {
                const stock = (addedSkus && addedSkus[prod.sku]) || 0;
                const added = stock > 0;
                return r('div', { key:prod.sku },
                  r('div', { style:{ display:'flex', alignItems:'center', gap:12, padding:'13px 0' } },
                    r('div', { style:{ width:38, height:38, borderRadius:10, background:C.stone, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 } },
                      this.ico('cube-outline', 17, C.pebble)
                    ),
                    r('div', { style:{ flex:1 } },
                      r('span', { style:{ fontSize:14, fontWeight:500, color:C.ink, display:'block', fontFamily:'system-ui' } }, prod.name),
                      r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, prod.brand)
                    ),
                    added
                      ? r('div', { style:{ display:'flex', alignItems:'center', gap:8 } },
                          r('button', {
                            onClick:() => { const n={...(this.state.addedSkus||{}),[prod.sku]:Math.max(0,stock-1)}; if(!n[prod.sku])delete n[prod.sku]; this.setState({addedSkus:n}); },
                            style:{ width:32, height:32, borderRadius:8, background:C.stone, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }
                          }, r('span', { style:{ fontSize:18, color:C.ink, lineHeight:1 } }, '−')),
                          r('span', { style:{ fontSize:14, fontWeight:600, minWidth:20, textAlign:'center', fontFamily:'system-ui', color:C.ink } }, String(stock)),
                          r('button', {
                            onClick:() => this.setState({addedSkus:{...(this.state.addedSkus||{}),[prod.sku]:stock+1}}),
                            style:{ width:32, height:32, borderRadius:8, background:C.mist, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }
                          }, r('span', { style:{ fontSize:18, color:C.sage, lineHeight:1 } }, '+'))
                        )
                      : r('button', {
                          onClick:() => this.setState({addedSkus:{...(this.state.addedSkus||{}),[prod.sku]:1}}),
                          style:{ padding:'7px 16px', borderRadius:9999, background:C.mist, border:'none', cursor:'pointer', flexShrink:0 }
                        },
                          r('span', { style:{ fontSize:13, fontWeight:600, color:C.forest, fontFamily:'system-ui' } }, 'Agregar')
                        )
                  ),
                  i < filteredProds.length - 1 ? r('div', { style:{ height:1, background:C.stone } }) : null
                );
              })
            )
      ),

      // Pie fijo
      r('div', { style:{ padding:'12px 20px 20px', flexShrink:0, borderTop:`1px solid ${C.stone}`, background:C.cream } },
        r('button', {
          onClick: () => this.setState({ modalScreen:null }),
          style:{ width:'100%', background:C.forest, border:'none', borderRadius:12, padding:'15px 20px', cursor:'pointer', marginBottom:10 }
        },
          r('span', { style:{ fontSize:15, fontWeight:600, color:C.cream, fontFamily:'system-ui' } },
            addedCount > 0 ? `Agregar a despensa · ${addedCount} producto${addedCount > 1 ? 's' : ''}` : 'Agregar a despensa'
          )
        ),
        r('button', {
          onClick: () => this.setState({ modalScreen:null }),
          style:{ width:'100%', background:'none', border:'none', padding:'8px 0', cursor:'pointer' }
        },
          r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, 'Saltar por ahora')
        )
      )
    );
  }

  renderAddProduct() {
    const C = this.C;
    const r = React.createElement;
    const { addProdSearch, addProdTypeName, addedSkus } = this.state;
    const selectedPantryName = (this.PANTRIES.find(p => p.id === this.state.despanPantry) || {}).name || '';

    const allProds = this.PRODS[addProdTypeName] || [
      { sku:'gp1', name:`${addProdTypeName} Premium`,   brand:'Marca A' },
      { sku:'gp2', name:`${addProdTypeName} Estándar`,  brand:'Marca B' },
      { sku:'gp3', name:`${addProdTypeName} Económico`, brand:'Marca C' },
    ];
    const filtered = allProds.filter(p =>
      p.name.toLowerCase().includes(addProdSearch.toLowerCase()) ||
      p.brand.toLowerCase().includes(addProdSearch.toLowerCase())
    );

    const pickerRow = (prod, i, arr) => {
      const stock = (addedSkus && addedSkus[prod.sku]) || 0;
      const added = stock > 0;
      return r('div', { key:prod.sku },
        r('div', { style:{ display:'flex', alignItems:'center', gap:12, padding:'14px 20px' } },
          r('div', { style:{ width:40, height:40, borderRadius:8, background:C.stone, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 } },
            this.ico('cube-outline', 18, C.pebble)),
          r('div', { style:{ flex:1 } },
            r('span', { style:{ fontSize:14, fontWeight:500, color:C.ink, display:'block', fontFamily:'system-ui' } }, prod.name),
            r('span', { style:{ fontSize:12, color:C.pebble, fontFamily:'system-ui' } }, prod.brand)
          ),
          added
            ? r('div', { style:{ display:'flex', alignItems:'center', gap:8 } },
                r('button', { onClick:() => { const n={...(this.state.addedSkus||{}),[prod.sku]:Math.max(0,stock-1)}; if(!n[prod.sku])delete n[prod.sku]; this.setState({addedSkus:n}); }, style:{ width:28, height:28, borderRadius:8, background:C.stone, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' } },
                  r('span', { style:{ fontSize:16, color:C.ink, lineHeight:1 } }, '−')),
                r('span', { style:{ fontSize:13, fontWeight:600, minWidth:20, textAlign:'center', fontFamily:'system-ui', color:C.ink } }, String(stock)),
                r('button', { onClick:() => this.setState({addedSkus:{...(this.state.addedSkus||{}),[prod.sku]:stock+1}}), style:{ width:28, height:28, borderRadius:8, background:C.stone, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' } },
                  r('span', { style:{ fontSize:16, color:C.sage, lineHeight:1 } }, '+'))
              )
            : r('button', { onClick:() => this.setState({addedSkus:{...(this.state.addedSkus||{}),[prod.sku]:1}}), style:{ padding:'6px 14px', borderRadius:9999, background:C.mist, border:'none', cursor:'pointer' } },
                r('span', { style:{ fontSize:13, fontWeight:600, color:C.forest, fontFamily:'system-ui' } }, 'Agregar'))
        ),
        i < arr.length - 1 ? r('div', { style:{ height:1, margin:'0 20px', background:C.stone } }) : null
      );
    };

    return r('div', { style:{ height:'100%', background:C.cream, display:'flex', flexDirection:'column' } },
      r('div', { style:{ padding:'16px 20px 12px' } },
        r('button', { onClick:() => this.setState({ modalScreen:null }), style:{ display:'flex', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer', padding:0, marginBottom:16 } },
          this.ico('chevron-back', 18, C.pebble),
          r('span', { style:{ fontSize:14, color:C.pebble, fontFamily:'system-ui' } }, 'Volver')
        ),
        r('div', { style:{ fontSize:26, fontWeight:600, color:C.ink, fontFamily:'"DM Serif Display", serif', marginBottom:2 } }, addProdTypeName),
        r('span', { style:{ fontSize:13, fontWeight:500, color:C.forest, display:'block', marginBottom:4, fontFamily:'system-ui' } }, selectedPantryName),
        r('span', { style:{ fontSize:13, color:C.pebble, display:'block', marginBottom:16, fontFamily:'system-ui' } }, 'Agrega productos de este tipo a tu despensa'),
        r('div', { style:{ display:'flex', alignItems:'center', background:C.stone, borderRadius:12, padding:'0 12px', gap:8 } },
          this.ico('search-outline', 18, C.pebble),
          r('input', { placeholder:'Buscar por nombre o marca…', value:addProdSearch, autoFocus:true, onChange:(e) => this.setState({ addProdSearch:e.target.value }),
            style:{ flex:1, border:'none', outline:'none', padding:'14px 0', fontSize:16, color:C.ink, background:'transparent', fontFamily:'system-ui' } }),
          addProdSearch.length > 0 ? r('button', { onClick:() => this.setState({ addProdSearch:'' }), style:{ background:'none', border:'none', cursor:'pointer', display:'flex', padding:4 } },
            this.ico('close-circle', 16, C.pebble)) : null
        )
      ),
      filtered.length === 0
        ? r('div', { style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12, padding:'0 20px' } },
            this.ico('search-outline', 48, C.pebble),
            r('span', { style:{ fontSize:15, color:C.pebble, textAlign:'center', fontFamily:'system-ui' } }, `Sin resultados para "${addProdSearch}"`)
          )
        : r('div', { style:{ flex:1, overflowY:'auto', paddingBottom:40 } },
            ...filtered.map((prod, i) => pickerRow(prod, i, filtered))
          )
    );
  }

  renderVals() {
    const { modalScreen, activeTab } = this.state;
    const screens = [
      () => this.renderHome(),
      () => this.renderDespensa(),
      () => this.renderRecetas(),
      () => this.renderLista(),
      () => this.renderHistorial(),
      () => this.renderSettings(),
    ];
    const screen = (screens[activeTab] || screens[0])();
    const hasOverlay = modalScreen !== null;
    const overlay = modalScreen === 'scan'           ? this.renderScan()
                  : modalScreen === 'add-type'      ? this.renderAddType()
                  : modalScreen === 'add-product'   ? this.renderAddProduct()
                  : modalScreen === 'public-recipes' ? this.renderPublicRecipes()
                  : modalScreen === 'recipe-detail'  ? this.renderRecipeDetail()
                  : modalScreen === 'recipe-create'  ? this.renderRecipeForm('create')
                  : modalScreen === 'recipe-edit'    ? this.renderRecipeForm('edit')
                  : null;
    return { screen, tabBar: this.renderTabBar(), hasOverlay, overlay };
  }
}

</script>
</body>
</html>
