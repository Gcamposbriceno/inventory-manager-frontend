name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Typecheck, Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

      - name: Tests
        run: npx jest --passWithNoTests
