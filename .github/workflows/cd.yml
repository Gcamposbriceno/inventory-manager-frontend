name: CD

on:
  push:
    branches:
      - main

jobs:
  update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        env:
          EXPO_PUBLIC_API_BASE_URL: https://inventory-manager-backend-zd9h.onrender.com/
          EXPO_PUBLIC_DEV_API_BASE_URL: https://inventory-manager-backend-zd9h.onrender.com/
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_bW92aW5nLWhvbmV5YmVlLTkzLmNsZXJrLmFjY291bnRzLmRldiQ
        run: eas update --channel preview --message "${{ github.event.head_commit.message }}" --non-interactive